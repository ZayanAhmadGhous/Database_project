<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home - Student Mental Health Tracker</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding-top: 80px;
        }

        .container {
            max-width: 800px;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            background-color: white;
            text-align: center;
        }

        h1 {
            font-weight: 700;
            color: #0d6efd;
            margin-bottom: 30px;
        }

        .btn-custom {
            width: 220px;
            margin: 10px auto;
        }

        .btn-reset {
            width: 220px;
            margin: 10px auto;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .btn-reset:hover {
            background-color: #bb2d3b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card mx-auto">
            <h1>Student Mental Health Tracker</h1>

            <a href="/add_student" class="btn btn-primary btn-lg btn-custom">➕ Add Student</a><br>
            <a href="/add_mood" class="btn btn-primary btn-lg btn-custom">📝 Log Mood</a><br>
            <a href="/view_mood" class="btn btn-success btn-lg btn-custom">📊 View Mood Logs</a><br>

            <form action="/clear_data" method="post" onsubmit="return confirm('Are you sure you want to delete all mood logs?');">
                <button class="btn btn-danger btn-custom" type="submit">🗑️ Reset Mood Logs</button>
            </form>

            <form action="/clear_students" method="post" onsubmit="return confirm('Are you sure you want to delete ALL student records?');">
                <button class="btn btn-reset btn-custom" type="submit">🔄 Reset Students</button>
            </form>
        </div>
    </div>

    <!-- Optional Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
